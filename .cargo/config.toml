# Build configuration for the xtensa-esp32s3-espidf target.
#
# The target triple (xtensa-esp32s3-espidf) is only recognized by the Xtensa
# Rust fork from `espup`; the stock rustup toolchain cannot compile it.

[build]
target = "xtensa-esp32s3-espidf"

# `cfg(target_os = "espidf")` matches any ESP-IDF target and is what the
# upstream esp-idf-template uses. ldproxy wraps the Xtensa linker and is pulled
# in transitively by the esp-idf-sys build; it resolves the extra linker
# arguments embuild emits.
[target.'cfg(target_os = "espidf")']
linker = "ldproxy"
# `cargo run` / `cargo espflash run` flash and open the monitor.
runner = "espflash flash --monitor"
# ESP-IDF 5.x uses a 64-bit time_t; this cfg keeps the Rust bindings in sync.
rustflags = ["--cfg", "espidf_time64"]

[unstable]
# The xtensa-esp*-espidf targets ship no precompiled core/std, so the standard
# library has to be built from source on every build. This requires the
# nightly-based Xtensa toolchain from espup (already selected by
# rust-toolchain.toml).
build-std = ["std", "panic_abort"]

[env]
# Explicit target MCU. esp-idf-sys also derives this from the target triple,
# but setting it here is harmless and makes the board intent obvious.
MCU = "esp32s3"
# ESP-IDF version defaults to a known-good tag chosen by esp-idf-sys.
# Uncomment to pin a specific release, e.g.:
# ESP_IDF_VERSION = "v5.3.1"
