# Build firmware, flash to board, and verify serial output.
#
# Fully self-contained: installs the ESP toolchain, espflash, and Python
# dependencies on every run.  The only prerequisite on the runner is Rust
# (rustup) and Python 3.
#
# Hardware requirements:
#   - Board connected via USB Serial/JTAG at /dev/ttyACM3
#   - Board in bootloader mode before the flash step
#     (hold BOOT, tap RESET, release BOOT)
#   - Runner user has write permission to /dev/ttyACM3
#     (add to dialout group or write a udev rule)

name: Build & Flash

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ESP toolchain
        run: |
          cargo +stable install espup
          espup install
          rustc --version
          rustup show active-toolchain

      - name: Build firmware (debug)
        run: |
          source "$HOME/export-esp.sh"
          cargo +stable install ldproxy
          cargo build

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: embed-sandbox-firmware
          path: target/xtensa-esp32s3-espidf/debug/embed-sandbox
          retention-days: 1

  flash:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: embed-sandbox-firmware

      - name: Check flash device
        run: |
          if [ -c /dev/ttyACM3 ]; then
            echo "Device /dev/ttyACM3 present"
            ls -l /dev/ttyACM3
          else
            echo "::error::Serial device /dev/ttyACM3 not found — is the board connected?"
            exit 1
          fi

      - name: Install espflash
        run: cargo +stable install espflash
      - name: Flash board
        run: |
          chmod +x embed-sandbox
          espflash flash \
            --port /dev/ttyACM3 \
            embed-sandbox
  verify:
    runs-on: self-hosted
    needs: flash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python3 -m venv /tmp/verify-env
          /tmp/verify-env/bin/pip install pyserial
          echo "PATH=/tmp/verify-env/bin:$PATH" >> "$GITHUB_ENV"

      - name: Wait for board reboot after flash
        run: |
          echo "Waiting for board to boot…"
          for i in $(seq 1 10); do
            if [ -c /dev/ttyACM3 ]; then
              echo "Device ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Verify serial output
        run: python3 scripts/verify_serial.py --port /dev/ttyACM3
