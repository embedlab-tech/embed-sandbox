name: Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install west and Python deps
        run: |
          pip install west pyyaml jsonschema -q

      - name: Download Zephyr SDK minimal bundle
        run: |
          mkdir -p toolchains
          cd toolchains
          curl -L -O https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v1.0.1/zephyr-sdk-1.0.1_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-1.0.1_linux-x86_64_minimal.tar.xz
          rm zephyr-sdk-1.0.1_linux-x86_64_minimal.tar.xz

      - name: Install ARM toolchain
        run: |
          cd toolchains/zephyr-sdk-1.0.1
          curl -L -O https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v1.0.1/toolchain_gnu_linux-x86_64_arm-zephyr-eabi.tar.xz
          tar xf toolchain_gnu_linux-x86_64_arm-zephyr-eabi.tar.xz
          rm toolchain_gnu_linux-x86_64_arm-zephyr-eabi.tar.xz
          mkdir -p gnu && mv arm-zephyr-eabi gnu/

      - name: Clone Zephyr and HAL modules
        run: |
          git clone --depth 1 --branch v4.4.1 https://github.com/zephyrproject-rtos/zephyr third_party/zephyr
          mkdir -p third_party/modules/hal
          git clone --depth 1 https://github.com/zephyrproject-rtos/cmsis third_party/modules/hal/cmsis
          git clone --depth 1 https://github.com/zephyrproject-rtos/hal_stm32 third_party/modules/hal/hal_stm32
          git clone --depth 1 https://github.com/zephyrproject-rtos/CMSIS_6 third_party/modules/hal/CMSIS_6
          cd third_party/modules/hal/CMSIS_6
          git fetch --depth 1 origin 30a859f44ef8ab4dc8f84b03ed586fd16ccf9d74
          git checkout 30a859f44ef8ab4dc8f84b03ed586fd16ccf9d74

      - name: Build firmware
        run: |
          export ZEPHYR_BASE=$PWD/third_party/zephyr
          export ZEPHYR_SDK_INSTALL_DIR=$PWD/toolchains/zephyr-sdk-1.0.1
          export ZEPHYR_TOOLCHAIN_VARIANT=zephyr
          export ZEPHYR_CMSIS_6_CMAKE_DIR=$ZEPHYR_BASE/modules/cmsis_6
          export ZEPHYR_MODULES=$PWD/third_party/modules/hal/cmsis;$PWD/third_party/modules/hal/hal_stm32;$PWD/third_party/modules/hal/CMSIS_6
          cmake -B build -DBOARD=nucleo_g070rb
          cmake --build build
